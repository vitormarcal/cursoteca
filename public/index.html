<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cursoteca</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navegacao principal">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">C</span>
          <div>
            <strong>Cursoteca</strong>
            <span>Biblioteca local</span>
          </div>
        </div>

        <nav class="side-nav">
          <button id="library-tab" class="nav-item active" type="button">
            <span aria-hidden="true">▶</span>
            Biblioteca
          </button>
          <button id="manage-tab" class="nav-item" type="button">
            <span aria-hidden="true">＋</span>
            Adicionar
          </button>
        </nav>

        <div class="side-note">
          <span id="course-count">0 cursos</span>
          <span id="media-count">0 itens nesta pasta</span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Aprender</p>
            <h1 id="page-title">Sua biblioteca</h1>
            <nav id="breadcrumb" class="breadcrumb" aria-label="Caminho atual"></nav>
          </div>
          <div class="top-actions">
            <button id="refresh-button" type="button" class="icon-button" title="Atualizar" aria-label="Atualizar">↻</button>
            <button id="open-manage" type="button" class="primary-action">Adicionar conteúdo</button>
          </div>
        </header>

        <section id="now-playing" class="now-playing" hidden aria-label="Video selecionado"></section>

        <section class="library" aria-labelledby="library-heading">
          <div class="section-heading">
            <div>
              <h2 id="library-heading">Continuar navegando</h2>
              <p id="course-description" class="muted-text"></p>
            </div>
          </div>
          <section id="context-actions" class="context-actions" aria-label="Adicionar conteúdo">
            <div class="inline-actions-header">
              <div>
                <p class="eyebrow">Adicionar</p>
                <h3>Ações neste contexto</h3>
              </div>
            </div>

            <div id="action-list" class="action-list" aria-label="Ações disponíveis"></div>

            <form id="course-form" class="form managed-form" autocomplete="off" hidden>
          <h3>Criar curso</h3>
          <label for="courseName">Nome do curso</label>
          <input id="courseName" name="courseName" type="text" required placeholder="Gramática Essencial">

          <label for="courseDescription">Descrição</label>
          <textarea id="courseDescription" name="courseDescription" rows="3" placeholder="Notas sobre o curso, professor ou objetivo"></textarea>

          <button id="course-button" type="submit">Criar curso</button>
          <p id="course-status" class="status" role="status" aria-live="polite"></p>
        </form>

        <form id="node-form" class="form managed-form" autocomplete="off" hidden>
          <h3>Criar seção</h3>
          <label for="nodeCourse" class="context-field">Curso</label>
          <select id="nodeCourse" name="nodeCourse" required></select>

          <label for="nodeParentFolder" class="context-field">Criar dentro de</label>
          <input id="nodeParentFolder" name="nodeParentFolder" type="text" placeholder="Etapa 1 - Fundação">

          <label for="nodeTitle">Nome</label>
          <input id="nodeTitle" name="nodeTitle" type="text" required placeholder="Módulo 01">

          <label for="nodeDescription">Descrição</label>
          <textarea id="nodeDescription" name="nodeDescription" rows="3" placeholder="Notas desta unidade"></textarea>

          <button id="node-button" type="submit">Criar unidade</button>
          <p id="node-status" class="status" role="status" aria-live="polite"></p>
        </form>

        <form id="download-form" class="form managed-form" autocomplete="off" hidden>
          <h3>Baixar aula</h3>
          <label for="course" class="context-field">Curso</label>
          <select id="course" name="course" required></select>

          <label for="lessonFolder" class="context-field">Seção da aula</label>
          <input id="lessonFolder" name="lessonFolder" type="text" required placeholder="Capítulo 4 - Sintaxe">

          <label for="lessonName">Nome da aula</label>
          <input id="lessonName" name="lessonName" type="text" required placeholder="Aula 5 - Sintaxe">

          <label for="url">URL da aula</label>
          <input id="url" name="url" type="url" required placeholder="https://...">

          <button id="submit-button" type="submit">Baixar video</button>
          <p id="status" class="status" role="status" aria-live="polite"></p>
        </form>

        <form id="video-form" class="form managed-form" enctype="multipart/form-data" hidden>
          <h3>Enviar vídeo</h3>
          <label for="videoCourse" class="context-field">Curso</label>
          <select id="videoCourse" name="videoCourse" required></select>

          <label for="videoFolder" class="context-field">Unidade da aula</label>
          <input id="videoFolder" name="videoFolder" type="text" required placeholder="Etapa 1/Módulo 01">

          <label for="videoTitle">Nome da aula</label>
          <input id="videoTitle" name="videoTitle" type="text" placeholder="Aula 01 - Sons básicos">

          <label for="videoDescription">Descrição</label>
          <textarea id="videoDescription" name="videoDescription" rows="3" placeholder="Notas desta aula"></textarea>

          <label for="videoFile">Arquivo MP4</label>
          <input id="videoFile" name="videoFile" type="file" accept="video/mp4,.mp4" required>

          <button id="video-button" type="submit">Enviar vídeo</button>
          <p id="video-status" class="status" role="status" aria-live="polite"></p>
        </form>

        <form id="pdf-form" class="form managed-form" enctype="multipart/form-data" hidden>
          <h3>Anexar PDFs</h3>
          <label for="pdfCourse" class="context-field">Curso</label>
          <select id="pdfCourse" name="pdfCourse" required></select>

          <label for="pdfFolder" class="context-field">Salvar em</label>
          <input id="pdfFolder" name="pdfFolder" type="text" placeholder="Capítulo 4 - Sintaxe">

          <label for="pdfScope" class="scope-field">Esse PDF pertence a</label>
          <select id="pdfScope" name="pdfScope">
            <option value="node">Seção atual</option>
            <option value="lesson">Aula selecionada</option>
            <option value="course">Curso inteiro</option>
          </select>

          <input id="pdfLessonPath" name="pdfLessonPath" type="hidden">
          <p id="pdf-lesson-label" class="target-label"></p>

          <label for="pdfFiles">PDFs da aula</label>
          <input id="pdfFiles" name="pdfFiles" type="file" accept="application/pdf,.pdf" multiple required>

          <button id="pdf-button" type="submit">Adicionar PDFs</button>
          <p id="pdf-status" class="status" role="status" aria-live="polite"></p>
        </form>

        <form id="audio-form" class="form managed-form" enctype="multipart/form-data" hidden>
          <h3>Anexar áudios</h3>
          <label for="audioCourse" class="context-field">Curso</label>
          <select id="audioCourse" name="audioCourse" required></select>

          <label for="audioFolder" class="context-field">Salvar em</label>
          <input id="audioFolder" name="audioFolder" type="text" placeholder="Capítulo 4 - Sintaxe">

          <label for="audioScope" class="scope-field">Esse áudio pertence a</label>
          <select id="audioScope" name="audioScope">
            <option value="node">Seção atual</option>
            <option value="lesson">Aula selecionada</option>
            <option value="course">Curso inteiro</option>
          </select>

          <input id="audioLessonPath" name="audioLessonPath" type="hidden">
          <p id="audio-lesson-label" class="target-label"></p>

          <label for="audioFiles">Áudios da aula</label>
          <input id="audioFiles" name="audioFiles" type="file" accept="audio/*,.mp3,.m4a,.aac,.wav,.ogg,.flac" multiple required>

          <button id="audio-button" type="submit">Adicionar áudios</button>
          <p id="audio-status" class="status" role="status" aria-live="polite"></p>
        </form>

        <form id="resource-form" class="form managed-form" autocomplete="off" hidden>
          <h3>Adicionar link</h3>
          <label for="resourceCourse" class="context-field">Curso</label>
          <select id="resourceCourse" name="resourceCourse" required></select>

          <label for="resourceFolder" class="context-field">Unidade</label>
          <input id="resourceFolder" name="resourceFolder" type="text" placeholder="Etapa 1/Módulo 01">

          <label for="resourceScope" class="scope-field">Esse link pertence a</label>
          <select id="resourceScope" name="resourceScope">
            <option value="node">Seção atual</option>
            <option value="lesson">Aula selecionada</option>
            <option value="course">Curso inteiro</option>
          </select>

          <input id="resourceLessonPath" name="resourceLessonPath" type="hidden">
          <p id="resource-lesson-label" class="target-label"></p>

          <label for="resourceTitle">Título</label>
          <input id="resourceTitle" name="resourceTitle" type="text" placeholder="Exercícios complementares">

          <label for="resourceUrl">URL</label>
          <input id="resourceUrl" name="resourceUrl" type="url" required placeholder="https://...">

          <label for="resourceDescription">Descrição</label>
          <textarea id="resourceDescription" name="resourceDescription" rows="3" placeholder="Observações sobre o link"></textarea>

          <button id="resource-button" type="submit">Adicionar link</button>
          <p id="resource-status" class="status" role="status" aria-live="polite"></p>
            </form>
          </section>
          <div id="file-list" class="shelves" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="/public/app.js" type="module"></script>
  </body>
</html>
