<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Língua Portuguesa</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <div class="intro">
          <p class="eyebrow">Língua Portuguesa</p>
          <h1 id="page-title">Baixar aula</h1>
        </div>

        <form id="course-form" class="form course-form" autocomplete="off">
          <div class="field full">
            <label for="courseName">Cadastrar curso</label>
            <input id="courseName" name="courseName" type="text" required placeholder="Gramática Essencial">
          </div>

          <div class="actions">
            <button id="course-button" type="submit" class="course-button">
              <span class="button-icon" aria-hidden="true">+</span>
              <span>Criar curso</span>
            </button>
            <p id="course-status" class="status" role="status" aria-live="polite"></p>
          </div>
        </form>

        <form id="download-form" class="form" autocomplete="off">
          <div class="field">
            <label for="course">Curso</label>
            <select id="course" name="course" required></select>
          </div>

          <div class="field">
            <label for="lessonFolder">Pasta da aula</label>
            <input id="lessonFolder" name="lessonFolder" type="text" required placeholder="Capítulo 4 - Sintaxe">
          </div>

          <div class="field">
            <label for="lessonName">Nome do arquivo</label>
            <input id="lessonName" name="lessonName" type="text" required placeholder="Aula 5 - Sintaxe">
          </div>

          <div class="field full">
            <label for="url">URL da aula</label>
            <input id="url" name="url" type="url" required placeholder="https://...">
          </div>

          <div class="actions">
            <button id="submit-button" type="submit">
              <span class="button-icon" aria-hidden="true">↓</span>
              <span>Baixar</span>
            </button>
            <p id="status" class="status" role="status" aria-live="polite"></p>
          </div>
        </form>

        <form id="pdf-form" class="form pdf-form" enctype="multipart/form-data">
          <div class="field">
            <label for="pdfCourse">Curso</label>
            <select id="pdfCourse" name="pdfCourse" required></select>
          </div>

          <div class="field">
            <label for="pdfFolder">Pasta dos PDFs</label>
            <input id="pdfFolder" name="pdfFolder" type="text" placeholder="Capítulo 4 - Sintaxe">
          </div>

          <div class="field full">
            <label for="pdfFiles">PDFs da aula</label>
            <input id="pdfFiles" name="pdfFiles" type="file" accept="application/pdf,.pdf" multiple required>
          </div>

          <div class="actions">
            <button id="pdf-button" type="submit" class="upload-button">
              <span class="button-icon" aria-hidden="true">+</span>
              <span>Adicionar PDFs</span>
            </button>
            <p id="pdf-status" class="status" role="status" aria-live="polite"></p>
          </div>
        </form>
      </section>

      <section class="library" aria-labelledby="library-title">
        <div class="section-heading">
          <div>
            <h2 id="library-title">Arquivos</h2>
            <nav id="breadcrumb" class="breadcrumb" aria-label="Caminho atual"></nav>
          </div>
          <button id="refresh-button" type="button" class="secondary">Atualizar</button>
        </div>
        <div id="file-list" class="file-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="/public/app.js" type="module"></script>
  </body>
</html>
